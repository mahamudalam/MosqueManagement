{% extends 'base_admin.html' %}

{% block content %}

<h2>➕ Add Member</h2>

<form method="POST" class="mt-3" id="addMemberForm">

    <input class="form-control mb-2" name="name" placeholder="Name" required>

    <input class="form-control mb-2" name="phone" placeholder="Phone">

    <input class="form-control mb-2" name="imam_salary_contri" type="number" step="0.01" placeholder="Imam Salary Contribution (₹)" required>

    <input class="form-control mb-2" name="address" placeholder="Address">

    <button class="btn btn-success" onclick="return confirmSubmit()">Save Member</button>

</form>

<script>
function confirmSubmit() {
    // Show confirmation dialog
    if (confirm('Are you sure you want to add this member?')) {
        // Form will be submitted
        setTimeout(() => {
            alert('Member added successfully!');
        }, 100);
        return true;
    }
    return false;
}
</script>

{% endblock %}
