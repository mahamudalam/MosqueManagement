{% extends 'base_admin.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">✏️ Edit Imam</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Imam Name</label>
                        <input type="text"
                               name="name"
                               class="form-control"
                               value="{{ imam.name }}"
                               placeholder="Enter Imam Name"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Mobile Number</label>
                        <input type="text"
                               name="mobile"
                               class="form-control"
                               value="{{ imam.mobile or '' }}"
                               placeholder="Enter Mobile Number">
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Joining Date</label>
                        <input type="date"
                               name="joining_date"
                               class="form-control"
                               value="{{ imam.joining_date }}" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Monthly Salary (₹)</label>
                        <input type="number"
                               step="0.01"
                               name="monthly_salary"
                               class="form-control"
                               value="{{ imam.monthly_salary }}"
                               placeholder="Enter Monthly Salary" required>
                    </div>

                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <textarea name="address"
                              rows="3"
                              class="form-control"
                              placeholder="Enter Address">{{ imam.address or '' }}</textarea>
                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Status</label>

                        <select name="status" class="form-select">

                            <option value="Active" {% if imam.status == "Active" %}selected{% endif %}>
                                Active
                            </option>

                            <option value="Inactive" {% if imam.status == "Inactive" %}selected{% endif %}>
                                Inactive
                            </option>

                        </select>

                    </div>

                </div>

                <div class="mt-3">

                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i>
                        Update Imam
                    </button>

                    <a href="{{ url_for('imam.Imam_detail') }}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i>
                        Back
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
