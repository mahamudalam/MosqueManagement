{% extends "base_admin.html" %}

{% block content %}


<div class="container py-4">

    <!-- Page Header -->
    <div class="card shadow-sm border-0 mb-4">

        <div class="card-header bg-primary text-white py-3">

            <h3 class="mb-0">
                <i class="fa fa-user-plus me-2"></i>
                Add Member
            </h3>

        </div>

    </div>

    <!-- Member Form -->
    <div class="card shadow-sm border-0">

        <div class="card-body">

            <form method="POST" id="addMemberForm">

                <div class="row">

                    <!-- Member Name -->
                    <div class="col-lg-6 col-md-6 col-12 mb-3">

                        <label class="form-label fw-semibold">
                            Member Name <span class="text-danger">*</span>
                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            placeholder="Enter member name"
                            required>

                    </div>

                    <!-- Phone -->
                    <div class="col-lg-6 col-md-6 col-12 mb-3">

                        <label class="form-label fw-semibold">
                            Phone Number
                        </label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control"
                            placeholder="Enter phone number">

                    </div>

                    <!-- Imam Salary Contribution -->
                    <div class="col-lg-6 col-md-6 col-12 mb-3">

                        <label class="form-label fw-semibold">
                            Imam Salary Contribution (₹)
                            <span class="text-danger">*</span>
                        </label>

                        <input
                            type="number"
                            step="0.01"
                            min="0"
                            name="imam_salary_contri"
                            class="form-control"
                            placeholder="Enter monthly contribution"
                            required>

                    </div>

                    <!-- Address -->
                    <div class="col-lg-6 col-md-6 col-12 mb-3">

                        <label class="form-label fw-semibold">
                            Address
                        </label>

                        <textarea
                            name="address"
                            rows="3"
                            class="form-control"
                            placeholder="Enter address"></textarea>

                    </div>

                </div>

                <hr>

                <!-- Buttons -->
                <div class="row">

                    <div class="col-12">

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">

                            <a href="{{ url_for('members.members') }}"
                               class="btn btn-secondary">

                                <i class="fa fa-arrow-left me-1"></i>
                                Back

                            </a>

                            <button
                                type="submit"
                                class="btn btn-primary"
                                onclick="return confirmSubmit()">

                                <i class="fa fa-save me-1"></i>
                                Save Member

                            </button>

                        </div>

                    </div>

                </div>

            </form>

        </div>

    </div>

</div>

<script>

function confirmSubmit() {
    return confirm("Are you sure you want to add this member?");
}

</script>

{% endblock %}
