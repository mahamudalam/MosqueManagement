{% extends 'base_admin.html' %}

{% block content %}

{% include "base.html" %}

<h2 class="mb-4">🕌 Friday Donation</h2>

<div class="card shadow p-4 mb-5">

<form method="POST">

<div class="row">

<div class="col-md-4">

<label>Member</label>

<select class="form-control" name="member_id" required>

<option value="">Select Member</option>

{% for member in members %}

<option value="{{ member.id }}">
    {{ member.name }}
</option>

{% endfor %}

</select>

</div>

<div class="col-md-3">

<label>Date</label>

<label>Select Friday</label>

<select class="form-select" name="donation_date" required>

    <option value="">Select Friday</option>

    {% for friday in fridays %}

    <option value="{{ friday }}">
        {{ friday.strftime('%d-%b-%Y') }}
    </option>

    {% endfor %}

</select>

</div>

<div class="col-md-3">

<label>Amount</label>

<input
type="number"
step="0.01"
name="amount"
class="form-control"
required>

</div>

<div class="col-md-2">

<label>&nbsp;</label>

<button class="btn btn-success w-100">

Save

</button>

</div>

</div>

<div class="mt-3">

<label>Remarks</label>

<input
class="form-control"
name="remarks">

</div>

</form>

</div>

<hr>

<h4>Donation History</h4>

<table class="table table-bordered table-striped">

<thead>

<tr>

<th>Date</th>
<th>Member</th>
<th>Amount</th>
<th>Remarks</th>

</tr>

</thead>

<tbody>

{% for d in donations %}

<tr>

<td>{{ d.donation_date }}</td>

<td>{{ d.member.name }}</td>

<td>₹ {{ "%.2f"|format(d.amount) }}</td>

<td>{{ d.remarks }}</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
