{% extends 'base_admin.html' %}

{% block content %}

<h2>✏️ Edit Member</h2>

<form method="POST" class="mt-3" id="editMemberForm">

    <input class="form-control mb-2" name="name" value="{{ member.name }}">

    <input class="form-control mb-2" name="phone" value="{{ member.phone }}">

    <input class="form-control mb-2" name="imam_salary_contri" type="number" step="0.01" value="{{ member.imam_salary_contri }}" required>

    <input class="form-control mb-2" name="address" value="{{ member.address or '' }}">

    <button class="btn btn-primary" onclick="return confirmUpdate()">Update</button>

    <a href="{{ url_for('main.members') }}" class="btn btn-secondary">Cancel</a>

</form>

<script>
function confirmUpdate() {
    // Show confirmation dialog
    if (confirm('Are you sure you want to update this member?')) {
        // Form will be submitted
        setTimeout(() => {
            alert('Member updated successfully!');
        }, 100);
        return true;
    }
    return false;
}
</script>

{% endblock %}
