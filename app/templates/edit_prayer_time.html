{% extends 'base_admin.html' %}

{% block content %}

<div class="container" style="max-width:500px">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h4>Edit Prayer Time</h4>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

Prayer Name

</label>

<input
type="text"
class="form-control"
value="{{ prayer.prayer_name }}"
readonly>

</div>

<div class="mb-3">

<label class="form-label">

Prayer Time

</label>

<input
type="time"
name="prayer_time"
class="form-control"
value="{{ prayer.prayer_time.strftime('%H:%M') }}"
required>

</div>

<button class="btn btn-success">

Save

</button>

<a
href="{{ url_for('prayer.prayer_times') }}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

{% endblock %}
